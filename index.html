<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>YouTube AI自動解析 DFJKリズムゲーム</title>
    <style>
        body { background-color: #1a1a1a; color: #ffffff; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .input-area { margin-bottom: 20px; display: flex; gap: 10px; align-items: center; }
        input[type="text"] { width: 300px; padding: 10px; border-radius: 4px; border: none; }
        select { padding: 10px; border-radius: 4px; border: none; background-color: #333; color: white; font-weight: bold; cursor: pointer; }
        button { padding: 10px 20px; background-color: #ff4757; color: white; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; }
        button:disabled { background-color: #555; cursor: not-allowed; }
        #status { margin-bottom: 10px; color: #feca57; font-weight: bold; }
        #game-layout { display: flex; gap: 30px; }
        #game-container { width: 360px; height: 500px; background-color: #111; border: 4px solid #333; border-radius: 8px; position: relative; overflow: hidden; }
        #lanes { display: flex; width: 100%; height: 100%; }
        .lane { flex: 1; height: 100%; border-right: 1px solid #222; position: relative; }
        .lane:last-child { border-right: none; }
        #judge-line { position: absolute; bottom: 60px; width: 100%; height: 6px; background-color: #ff4757; box-shadow: 0 0 10px #ff4757; z-index: 10; }
        .key-label { position: absolute; bottom: 15px; width: 100%; text-align: center; font-weight: bold; color: #666; }
        .note { position: absolute; width: 90%; left: 5%; height: 15px; background: linear-gradient(to bottom, #00d2d3, #00a8ff); border-radius: 4px; z-index: 5; }
        #ui-overlay { position: absolute; top: 20%; width: 100%; text-align: center; pointer-events: none; z-index: 20; }
        #judge-text { font-size: 28px; font-weight: bold; height: 35px; }
        #combo-text { font-size: 20px; color: #feca57; }
    </style>
</head>
<body>

    <h1>YouTube AI自動解析 DFJKリズムゲーム</h1>
    
    <div class="input-area">
        <input type="text" id="video-url" placeholder="YouTube動画のURLを入力">
        <select id="difficulty-select">
            <option value="easy">かんたん (Easy)</option>
            <option value="normal" selected>ふつう (Normal)</option>
            <option value="hard">むずかしい (Hard)</option>
        </select>
        <button id="load-btn" onclick="requestAnalysis()">曲を解析して読み込む</button>
    </div>
    <div id="status"></div>

    <div id="game-layout">
        <div id="player"></div>
        <div id="game-container">
            <div id="ui-overlay">
                <div id="judge-text"></div>
                <div id="combo-text"></div>
            </div>
            <div id="lanes">
                <div class="lane" id="lane-D"><div class="key-label">D</div></div>
                <div class="lane" id="lane-F"><div class="key-label">F</div></div>
                <div class="lane" id="lane-J"><div class="key-label">J</div></div>
                <div class="lane" id="lane-K"><div class="key-label">K</div></div>
            </div>
            <div id="judge-line"></div>
        </div>
    </div>

<script>
var tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
var firstScriptTag = document.getElementsByTagName('script')[0];
firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

var player;
function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
        height: '240',
        width: '360',
        videoId: '', 
        events: { 'onStateChange': onPlayerStateChange }
    });
}

function extractVideoId(url) {
    var regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
    var match = url.match(regExp);
    return (match && match[2].length == 11) ? match[2] : null;
}

async function requestAnalysis() {
    var url = document.getElementById('video-url').value;
    var diff = document.getElementById('difficulty-select').value; // 難易度を取得
    var videoId = extractVideoId(url);
    
    if(!videoId) {
        alert("有効なYouTubeのURLを入力してください。");
        return;
    }

    var statusEl = document.getElementById('status');
    var btn = document.getElementById('load-btn');
    statusEl.innerText = "高精度リズム解析中... (30秒ほどかかります)";
    btn.disabled = true;

    try {
        var response = await fetch('http://127.0.0.1:5000/generate', {
            method: 'POST',
            mode: 'cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url: url, difficulty: diff }) // 難易度を送信
        });
        
        var data = await response.json();
        
        if (data.chart) {
            chart = data.chart;
            player.loadVideoById(videoId);
            resetGameUI();
            statusEl.innerText = "自動生成完了！動画が再生されるとスタートします！";
        } else {
            statusEl.innerText = "エラー: " + (data.error || "解析に失敗しました");
        }
    } catch (e) {
        console.error(e);
        statusEl.innerText = "Pythonサーバーに接続できませんでした。";
    } finally {
        btn.disabled = false;
    }
}

var chart = [];
var combo = 0;
var isPlaying = false;

function resetGameUI() {
    combo = 0;
    document.getElementById('judge-text').innerText = "";
    document.getElementById('combo-text').innerText = "";
    document.querySelectorAll('.note').forEach(n => n.remove());
}

function onPlayerStateChange(event) {
    if (event.data == YT.PlayerState.PLAYING) {
        isPlaying = true;
        updateGame();
    } else if (event.data == YT.PlayerState.ENDED) {
        isPlaying = false;
        showVerdict("FINISH!", "#feca57");
    } else {
        isPlaying = false;
    }
}

var judgeLineTop = 440; 
var scrollSpeed = 250; 

function updateGame() {
    if (!isPlaying) return;
    var currentTime = player.getCurrentTime();

    chart.forEach(function(note) {
        if (currentTime >= note.time - 2.0 && !note.spawned && !note.hit) {
            spawnNoteElement(note);
            note.spawned = true;
        }
    });
    requestAnimationFrame(updateGame);
}

function spawnNoteElement(note) {
    var laneElement = document.getElementById('lane-' + note.lane);
    var noteElement = document.createElement('div');
    noteElement.className = 'note';
    laneElement.appendChild(noteElement);

    function animateNote() {
        if (!isPlaying) {
            if (!note.hit && noteElement.parentNode) requestAnimationFrame(animateNote);
            return;
        }

        var nowTime = player.getCurrentTime();
        var timeDiff = note.time - nowTime; 
        var currentTop = judgeLineTop - (timeDiff * scrollSpeed);

        if (note.hit) {
            noteElement.remove();
            return;
        }

        if (timeDiff < -0.15) {
            noteElement.remove();
            if (!note.hit) {
                showVerdict("MISS", "#ff4757");
                combo = 0;
                document.getElementById('combo-text').innerText = "";
                note.hit = true;
            }
            return;
        }

        noteElement.style.top = currentTop + 'px';
        requestAnimationFrame(animateNote);
    }
    requestAnimationFrame(animateNote);
}

window.addEventListener('keydown', function(e) {
    var key = e.key.toUpperCase();
    if (['D', 'F', 'J', 'K'].includes(key)) {
        if (!isPlaying) return;
        var currentTime = player.getCurrentTime();
        
        var targetNote = chart.find(function(note) {
            return note.lane === key && !note.hit && Math.abs(note.time - currentTime) < 0.2;
        });

        if (targetNote) {
            targetNote.hit = true;
            showVerdict("PERFECT", "#00d2d3");
            combo++;
            document.getElementById('combo-text').innerText = combo + " COMBO";
        }
    }
});

function showVerdict(text, color) {
    var el = document.getElementById('judge-text');
    el.innerText = text;
    el.style.color = color;
}
</script>
</body>
</html>
