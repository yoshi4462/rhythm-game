<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ブラウザ高精度AI解析 DFJKリズムゲーム (HTML完結版)</title>
    <style>
        body { background-color: #1a1a1a; color: #ffffff; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .input-area { margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; align-items: center; background-color: #2a2a2a; padding: 15px; border-radius: 8px; border: 2px dashed #555; width: 400px; }
        input[type="file"] { display: none; }
        .file-label { padding: 10px 20px; background-color: #ff4757; color: white; font-weight: bold; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .file-label:hover { background-color: #ff6b81; }
        #status { margin-bottom: 15px; color: #feca57; font-weight: bold; text-align: center; }
        #game-layout { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        #game-container { width: 360px; height: 500px; background-color: #111; border: 4px solid #333; border-radius: 8px; position: relative; overflow: hidden; }
        #lanes { display: flex; width: 100%; height: 100%; }
        .lane { flex: 1; height: 100%; border-right: 1px solid #222; position: relative; }
        .lane:last-child { border-right: none; }
        #judge-line { position: absolute; bottom: 60px; width: 100%; height: 6px; background-color: #ff4757; box-shadow: 0 0 10px #ff4757; z-index: 10; }
        .key-label { position: absolute; bottom: 15px; width: 100%; text-align: center; font-weight: bold; color: #666; }
        .note { position: absolute; width: 90%; left: 5%; height: 15px; background: linear-gradient(to bottom, #00d2d3, #00a8ff); border-radius: 4px; z-index: 5; }
        #ui-overlay { position: absolute; top: 20%; width: 100%; text-align: center; pointer-events: none; z-index: 20; }
        #judge-text { font-size: 28px; font-weight: bold; height: 35px; }
        #combo-text { font-size: 20px; color: #feca57; }
        audio { width: 360px; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>ブラウザ高精度AI解析 DFJKリズムゲーム</h1>
    
    <div class="input-area">
        <div id="drop-zone">音楽ファイル（mp3/wavなど）を選択してください</div>
        <label class="file-label">
            ファイルを選択
            <input type="file" id="audio-file" accept="audio/*" onchange="handleFileSelect(event)">
        </label>
    </div>
    <div id="status">曲を読み込むと、自動で高密度な音ハメ譜面が生成されます。</div>

    <div id="game-layout">
        <div id="game-container">
            <div id="ui-overlay">
                <div id="judge-text"></div>
                <div id="combo-text"></div>
            </div>
            <div id="lanes">
                <div class="lane" id="lane-D"><div class="key-label">D</div></div>
                <div class="lane" id="lane-F"><div class="key-label">F</div></div>
                <div class="lane" id="lane-J"><div class="key-label">J</div></div>
                <div class="lane" id="lane-K"><div class="key-label">K</div></div>
            </div>
            <div id="judge-line"></div>
        </div>
        <audio id="audio-player" controls></audio>
    </div>

<script>
var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
var audioPlayer = document.getElementById('audio-player');
var chart = [];
var combo = 0;
var isPlaying = false;
var lanes = ['D', 'F', 'J', 'K'];

// ファイルが読み込まれた時の処理
function handleFileSelect(event) {
    var file = event.target.files[0];
    if (!file) return;

    document.getElementById('status').innerText = "ブラウザAIが楽曲を解析中...（数秒かかります）";
    resetGame();

    // プレイヤーに音声をセット
    var fileURL = URL.createObjectURL(file);
    audioPlayer.src = fileURL;

    // 音声をデコードして波形解析を行う
    var reader = new FileReader();
    reader.onload = function(e) {
        audioCtx.decodeAudioData(e.target.result, function(buffer) {
            analyzeAudio(buffer);
        });
    };
    reader.readAsArrayBuffer(file);
}

// 【重要】Pythonのlibrosaと同じことをブラウザ内で行う解析アルゴリズム
function analyzeAudio(buffer) {
    var rawData = buffer.getChannelData(0); // モノラルで波形を取得
    var sampleRate = buffer.sampleRate;
    
    // 0.02秒（20ms）ごとの音量（エネルギー）の変化を計算
    var frameSize = Math.floor(sampleRate * 0.02);
    var energies = [];
    
    for (var i = 0; i < rawData.length; i += frameSize) {
        var sum = 0;
        for (var j = 0; j < frameSize && (i + j) < rawData.length; j++) {
            sum += rawData[i + j] * rawData[i + j];
        }
        energies.push(Math.sqrt(sum / frameSize));
    }

    // 音の立ち上がり（オンセット）を検出
    chart = [];
    var maxEnergy = Math.max(...energies);
    var lastNoteTime = 0;

    for (var i = 1; i < energies.length - 1; i++) {
        var time = (i * frameSize) / sampleRate;
        
        // 前後のフレームより音が大きく、かつ全体の最大音量の 6% 以上の場所（無音での生成を防止）
        if (energies[i] > energies[i - 1] && energies[i] > energies[i + 1] && energies[i] > (maxEnergy * 0.06)) {
            
            // 激難を超える超高密度制限：ノーツの間隔を「最短0.04秒」まで許容して詰め込む
            if (time - lastNoteTime > 0.04) {
                var lane = lanes[Math.floor(Math.random() * lanes.length)];
                chart.push({
                    time: time,
                    lane: lane,
                    hit: false,
                    spawned: false
                });
                lastNoteTime = time;
            }
        }
    }

    document.getElementById('status').innerText = "解析完了！総ノーツ数: " + chart.length + " の超鬼譜面が生成されました！再生ボタンでスタート！";
}

function resetGame() {
    chart = [];
    combo = 0;
    document.getElementById('judge-text').innerText = "";
    document.getElementById('combo-text').innerText = "";
    document.querySelectorAll('.note').forEach(n => n.remove());
}

// 音楽の再生状態の監視
audioPlayer.addEventListener('play', function() {
    isPlaying = true;
    updateGame();
});

audioPlayer.addEventListener('pause', function() {
    isPlaying = false;
});

audioPlayer.addEventListener('ended', function() {
    isPlaying = false;
    showVerdict("FINISH!", "#feca57");
});

var judgeLineTop = 440; 
var scrollSpeed = 280; // ノーツが速く感じるようにスピードも少しアップ！

function updateGame() {
    if (!isPlaying) return;
    var currentTime = audioPlayer.currentTime;

    chart.forEach(function(note) {
        if (currentTime >= note.time - 2.0 && !note.spawned && !note.hit) {
            spawnNoteElement(note);
            note.spawned = true;
        }
    });
    requestAnimationFrame(updateGame);
}

function spawnNoteElement(note) {
    var laneElement = document.getElementById('lane-' + note.lane);
    var noteElement = document.createElement('div');
    noteElement.className = 'note';
    laneElement.appendChild(noteElement);

    function animateNote() {
        if (!isPlaying) {
            if (!note.hit && noteElement.parentNode) requestAnimationFrame(animateNote);
            return;
        }

        var nowTime = audioPlayer.currentTime;
        var timeDiff = note.time - nowTime; 
        var currentTop = judgeLineTop - (timeDiff * scrollSpeed);

        if (note.hit) {
            noteElement.remove();
            return;
        }

        if (timeDiff < -0.15) {
            noteElement.remove();
            if (!note.hit) {
                showVerdict("MISS", "#ff4757");
                combo = 0;
                document.getElementById('combo-text').innerText = "";
                note.hit = true;
            }
            return;
        }

        noteElement.style.top = currentTop + 'px';
        requestAnimationFrame(animateNote);
    }
    requestAnimationFrame(animateNote);
}

// キーボード判定
window.addEventListener('keydown', function(e) {
    var key = e.key.toUpperCase();
    if (lanes.includes(key)) {
        if (!isPlaying) return;
        var currentTime = audioPlayer.currentTime;
        
        // 最もタイミングの近いノーツを探す
        var targetNote = chart.find(function(note) {
            return note.lane === key && !note.hit && Math.abs(note.time - currentTime) < 0.15;
        });

        if (targetNote) {
            targetNote.hit = true;
            showVerdict("PERFECT", "#00d2d3");
            combo++;
            document.getElementById('combo-text').innerText = combo + " COMBO";
        }
    }
});

function showVerdict(text, color) {
    var el = document.getElementById('judge-text');
    el.innerText = text;
    el.style.color = color;
}
</script>
</body>
</html>
