<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhythm Stream - Pure Auto Player</title>
    <style>
        /* ==========================================================================
           全体デザイン：白を基調とした超シンプル・ミニマルスタイル
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
        }

        h1 {
            font-size: 28px;
            text-align: center;
            margin-bottom: 25px;
            letter-spacing: 2px;
            font-weight: bold;
            border-bottom: 2px solid #000000;
            padding-bottom: 10px;
        }

        button {
            background-color: #000000;
            color: #ffffff;
            border: 1px solid #000000;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: #ffffff;
            color: #000000;
        }

        .screen {
            display: none;
            width: 100%;
            flex-direction: column;
            gap: 20px;
        }

        .screen.active {
            display: flex;
        }

        /* ==========================================================================
           【画面1】トップ画面（URL入力 ＆ 楽曲リスト）
           ========================================================================== */
        .input-box {
            border: 1px solid #000000;
            padding: 20px;
            background-color: #f9f9f9;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-box input {
            padding: 12px;
            font-size: 15px;
            border: 1px solid #000000;
            outline: none;
            width: 100%;
        }

        .list-title {
            font-size: 18px;
            font-weight: bold;
            margin-top: 10px;
            border-bottom: 1px solid #000000;
            padding-bottom: 5px;
        }

        .song-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .song-item {
            border: 1px solid #000000;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #ffffff;
        }

        .song-info h3 {
            font-size: 16px;
            margin-bottom: 4px;
        }

        .song-info p {
            font-size: 12px;
            color: #666666;
        }

        .delete-btn {
            background-color: #ffffff;
            color: #ff4444;
            border-color: #ff4444;
            padding: 6px 12px;
            font-size: 13px;
        }
        .delete-btn:hover {
            background-color: #ff4444;
            color: #ffffff;
        }

        /* ==========================================================================
           【画面2】プレイ画面
           ========================================================================== */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background-color: #000000;
            border: 1px solid #000000;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .game-status {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            padding: 0 10px;
        }

        .game-container {
            position: relative;
            width: 100%;
            height: 400px;
            border: 2px solid #000000;
            background-color: #ffffff;
            overflow: hidden;
        }

        .lanes {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .lane {
            flex: 1;
            border-right: 1px solid #e0e0e0;
            position: relative;
            height: 100%;
        }

        .lane:last-child { border-right: none; }
        .lane.active { background-color: #f0f0f0; }

        .line {
            position: absolute;
            bottom: 60px;
            width: 100%;
            height: 3px;
            background-color: #000000;
            z-index: 5;
        }

        .key-text {
            position: absolute;
            bottom: 15px;
            width: 100%;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
        }

        .note {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            left: calc(50% - 20px);
            z-index: 3;
            transform: translateY(-20px);
            background-color: #000000;
        }

        .ui-text {
            position: absolute;
            top: 35%;
            width: 100%;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            height: 40px;
            pointer-events: none;
            z-index: 10;
        }

        .control-panel {
            display: flex;
            gap: 10px;
        }
        .control-panel button {
            flex: 1;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Rhythm Stream</h1>

    <div id="view-top" class="screen active">
        <div class="input-box">
            <h3 style="font-size: 16px;">🎵 新しい曲を自動生成して追加</h3>
            <input type="text" id="input-title" placeholder="曲のタイトルを入力">
            <input type="text" id="input-url" placeholder="YouTubeの動画URL または 動画ID を入力">
            <button onclick="generateNewChart()">⚡ 音符を全自動生成して保存</button>
        </div>

        <div class="list-title">📋 作成された楽譜リスト</div>
        <div id="list-container" class="song-list"></div>
    </div>

    <div id="view-play" class="screen">
        <button onclick="toTopView()" style="background-color: #ffffff; color: #000; border-color: #000; align-self: flex-start; padding: 6px 12px; font-size: 14px;">← リストに戻る</button>
        
        <h2 id="play-title" style="text-align: center; font-size: 18px;">-</h2>
        
        <div class="video-wrapper">
            <div id="yt-player"></div>
        </div>

        <div class="game-status">
            <div id="txt-score">SCORE: 0</div>
            <div id="txt-combo">COMBO: 0</div>
        </div>

        <div class="game-container">
            <div id="txt-judge" class="ui-text"></div>
            <div class="line"></div>
            <div class="lanes">
                <div class="lane" id="lane-0"><span class="key-text">D</span></div>
                <div class="lane" id="lane-1"><span class="key-text">F</span></div>
                <div class="lane" id="lane-2"><span class="key-text">J</span></div>
                <div class="lane" id="lane-3"><span class="key-text">K</span></div>
            </div>
        </div>

        <div class="control-panel">
            <button onclick="readyToPlay()">▶ 3秒後にスタート</button>
            <button onclick="resetGame()" style="background-color: #ffffff; color: #000;">🔄 リセット</button>
        </div>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
    const KEY_CHARS = ['d', 'f', 'j', 'k'];
    let ytPlayer = null;
    let currentVideoId = '';
    
    let isPlaying = false;
    let isWaiting = false;
    let score = 0;
    let combo = 0;
    let activeNotes = [];
    let songNotes = [];
    let noteIndex = 0;
    
    let timerId = null;
    let frameId = null;
    let countdownId = null;

    const TARGET_Y = 340; 
    const FALL_SPEED = 6; 

    // 打鍵音
    let audioCtx = null;
    function playSound() {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(350, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        } catch(e) {}
    }

    window.addEventListener('DOMContentLoaded', () => {
        if (!localStorage.getItem('rhythm_songs')) {
            localStorage.setItem('rhythm_songs', JSON.stringify([]));
        }
        showSongList();
    });

    function showSongList() {
        const container = document.getElementById('list-container');
        container.innerHTML = '';
        const songs = JSON.parse(localStorage.getItem('rhythm_songs')) || [];

        if (songs.length === 0) {
            container.innerHTML = '<p style="color:#666; text-align:center; padding:20px; font-size:14px;">楽譜がありません。上のフォームから追加してください。</p>';
            return;
        }

        songs.forEach(song => {
            const item = document.createElement('div');
            item.className = 'song-item';
            item.innerHTML = `
                <div class="song-info">
                    <h3>${song.title}</h3>
                    <p>総ノーツ数: ${song.notes.length}個</p>
                </div>
                <div style="display:flex; gap:8px;">
                    <button onclick="startPlayMode('${song.id}')" style="padding:6px 14px; font-size:14px;">▶ 遊ぶ</button>
                    <button class="delete-btn" onclick="deleteSong('${song.id}')">削除</button>
                </div>
            `;
            container.appendChild(item);
        });
    }

    function extractId(url) {
        if (!url) return null;
        const s = url.trim();
        if (s.length === 11 && !s.includes('/') && !s.includes('=')) return s;
        const reg = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const m = s.match(reg);
        return (m && m[2].length === 11) ? m[2] : null;
    }

    // URLから全自動で音符を作るコア処理
    function generateNewChart() {
        const title = document.getElementById('input-title').value.trim();
        const urlValue = document.getElementById('input-url').value;
        const id = extractId(urlValue);

        if (!title) { alert('曲のタイトルを入力してください！'); return; }
        if (!id) { alert('正しいYouTubeのURLまたは動画IDを入力してください。'); return; }

        // 完全自動のランダム生成ロジック（4分間分、D F J Kのキーをちりばめる）
        const generated = [];
        let timeTracker = 4.0; 
        const keys = ['D', 'F', 'J', 'K'];

        while (timeTracker < 240) {
            const randomKey = keys[Math.floor(Math.random() * keys.length)];
            generated.push({
                time: parseFloat(timeTracker.toFixed(2)),
                key: randomKey
            });
            // 0.4秒〜0.8秒の間隔でランダムに次のノーツを配置
            timeTracker += 0.4 + (Math.floor(Math.random() * 3) * 0.2);
        }

        const newSong = {
            id: 'song_' + Date.now(),
            title: title,
            videoId: id,
            notes: generated
        };

        const songs = JSON.parse(localStorage.getItem('rhythm_songs')) || [];
        songs.push(newSong);
        localStorage.setItem('rhythm_songs', JSON.stringify(songs));

        alert(`✨ 「${title}」の音符データを全自動生成して保存しました！`);
        
        document.getElementById('input-title').value = '';
        document.getElementById('input-url').value = '';
        showSongList();
    }

    function deleteSong(id) {
        if (!confirm('この曲を削除しますか？')) return;
        let songs = JSON.parse(localStorage.getItem('rhythm_songs')) || [];
        songs = songs.filter(s => s.id !== id);
        localStorage.setItem('rhythm_songs', JSON.stringify(songs));
        showSongList();
    }

    function startPlayMode(id) {
        const songs = JSON.parse(localStorage.getItem('rhythm_songs')) || [];
        const target = songs.find(s => s.id === id);
        if (!target) return;

        document.getElementById('play-title').innerText = `🎵 曲名: ${target.title}`;
        currentVideoId = target.videoId;
        songNotes = target.notes.sort((a, b) => a.time - b.time);

        if (ytPlayer && typeof ytPlayer.cueVideoById === 'function') {
            ytPlayer.cueVideoById(currentVideoId);
        }

        document.getElementById('view-top').classList.remove('active');
        document.getElementById('view-play').classList.add('active');
    }

    function toTopView() {
        if (countdownId) clearInterval(countdownId);
        stopGame();
        if (ytPlayer && typeof ytPlayer.pauseVideo === 'function') ytPlayer.pauseVideo();
        resetGame();

        document.getElementById('view-play').classList.remove('active');
        document.getElementById('view-top').classList.add('active');
        showSongList();
    }

    function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player('yt-player', {
            videoId: 'P_NfP9_I6As',
            playerVars: { 'playsinline': 1, 'controls': 1, 'disablekb': 1 },
            events: { 'onStateChange': onPlayerStateChange }
        });
    }

    function readyToPlay() {
        if (isPlaying || isWaiting) return;
        isWaiting = true;
        resetGame();

        let count = 3;
        setJudgeUI(count, "#000");

        countdownId = setInterval(() => {
            count--;
            if (count > 0) {
                setJudgeUI(count, "#000");
            } else if (count === 0) {
                setJudgeUI("START!!", "#000");
            } else {
                clearInterval(countdownId);
                isWaiting = false;
                setJudgeUI("", "#000");
                if (ytPlayer) ytPlayer.playVideo();
            }
        }, 1000);
    }

    function onPlayerStateChange(event) {
        if (event.data === YT.PlayerState.PLAYING) {
            if (!isPlaying) {
                isPlaying = true;
                frameId = requestAnimationFrame(gameLoop);
                timerId = setInterval(spawnCheck, 20);
            }
        } else {
            stopGame();
        }
    }

    function spawnCheck() {
        if (!isPlaying || !ytPlayer) return;
        const current = ytPlayer.getCurrentTime();
        const delay = (TARGET_Y / FALL_SPEED) / 60;

        while (noteIndex < songNotes.length) {
            const noteData = songNotes[noteIndex];
            if (current >= (noteData.time - delay)) {
                const lIdx = KEY_CHARS.indexOf(noteData.key.toLowerCase());
                if (lIdx !== -1) {
                    createNoteNode(lIdx);
                }
                noteIndex++;
            } else {
                break;
            }
        }
    }

    function createNoteNode(laneIdx) {
        const lane = document.getElementById(`lane-${laneIdx}`);
        if (!lane) return;
        const div = document.createElement('div');
        div.className = 'note';
        div.style.top = '0px';
        lane.appendChild(div);

        activeNotes.push({
            lane: laneIdx,
            y: 0,
            element: div
        });
    }

    function gameLoop() {
        if (!isPlaying) return;
        for (let i = activeNotes.length - 1; i >= 0; i--) {
            const note = activeNotes[i];
            note.y += FALL_SPEED;
            note.element.style.top = note.y + 'px';

            if (note.y > TARGET_Y + 40) {
                setJudgeUI("Miss", "#666");
                combo = 0;
                document.getElementById('txt-combo').innerText = `COMBO: ${combo}`;
                if (note.element.parentNode) note.element.parentNode.removeChild(note.element);
                activeNotes.splice(i, 1);
            }
        }
        frameId = requestAnimationFrame(gameLoop);
    }

    // キー入力の判定
    window.addEventListener('keydown', (e) => {
        const k = e.key.toLowerCase();
        const idx = KEY_CHARS.indexOf(k);
        if (idx === -1) return;

        const lane = document.getElementById(`lane-${idx}`);
        if (lane) lane.classList.add('active');
        playSound();

        if (isPlaying && !isWaiting) {
            let targetIdx = -1;
            let maxY = -1;
            for (let i = 0; i < activeNotes.length; i++) {
                if (activeNotes[i].lane === idx && activeNotes[i].y > maxY) {
                    maxY = activeNotes[i].y;
                    targetIdx = i;
                }
            }

            if (targetIdx !== -1) {
                const note = activeNotes[targetIdx];
                const diff = Math.abs(note.y - TARGET_Y);
                let hit = false;

                if (diff <= 18) {
                    setJudgeUI("Perfect!", "#000");
                    score += 100; combo++; hit = true;
                } else if (diff <= 38) {
                    setJudgeUI("Great!", "#333");
                    score += 50; combo++; hit = true;
                } else if (diff <= 58) {
                    setJudgeUI("Good", "#666");
                    score += 20; combo++; hit = true;
                }

                if (hit) {
                    document.getElementById('txt-score').innerText = `SCORE: ${score}`;
                    document.getElementById('txt-combo').innerText = `COMBO: ${combo}`;
                    if (note.element.parentNode) note.element.parentNode.removeChild(note.element);
                    activeNotes.splice(targetIdx, 1);
                }
            }
        }
    });

    window.addEventListener('keyup', (e) => {
        const k = e.key.toLowerCase();
        const idx = KEY_CHARS.indexOf(k);
        if (idx !== -1) {
            const lane = document.getElementById(`lane-${idx}`);
            if (lane) lane.classList.remove('active');
        }
    });

    function setJudgeUI(text, color) {
        const el = document.getElementById('txt-judge');
        el.innerText = text;
        el.style.color = color;
    }

    function stopGame() {
        isPlaying = false;
        if (frameId) cancelAnimationFrame(frameId);
        if (timerId) clearInterval(timerId);
    }

    function resetGame() {
        stopGame();
        score = 0;
        combo = 0;
        noteIndex = 0;
        document.getElementById('txt-score').innerText = "SCORE: 0";
        document.getElementById('txt-combo').innerText = "COMBO: 0";
        document.getElementById('txt-judge').innerText = "";
        activeNotes.forEach(n => {
            if (n.element && n.element.parentNode) n.element.parentNode.removeChild(n.element);
        });
        activeNotes = [];
    }
</script>
</body>
</html>
