<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhythm Stream - Custom Edition</title>
    <style>
        /* ==========================================================================
           全体デザイン（ミニマル・モノトーン）
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
        }

        h1 {
            font-size: 26px;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        button {
            background-color: #000000;
            color: #ffffff;
            border: 1px solid #000000;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: #ffffff;
            color: #000000;
        }

        .screen {
            display: none;
            width: 100%;
            flex-direction: column;
        }

        .screen.active {
            display: flex;
        }

        .back-btn {
            background-color: #ffffff;
            color: #000000;
            align-self: flex-start;
            margin-bottom: 20px;
            padding: 8px 16px;
            font-size: 14px;
        }

        /* YouTube埋め込みレスポンシブ対応 */
        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background-color: #000000;
            margin-bottom: 20px;
        }

        .video-container iframe, .video-container div {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ==========================================================================
           【画面1】トップ画面 & 譜面一覧
           ========================================================================== */
        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #000000;
            padding-bottom: 15px;
        }

        .top-header h2 { font-size: 20px; }

        .chart-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .chart-item {
            border: 1px solid #000000;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #ffffff;
        }

        .chart-info h3 {
            font-size: 18px;
            margin-bottom: 5px;
        }

        .chart-info p {
            font-size: 13px;
            color: #666666;
        }

        .chart-btns {
            display: flex;
            gap: 10px;
        }

        .delete-btn {
            background-color: #ffffff;
            color: #ff0000;
            border-color: #ff0000;
        }
        .delete-btn:hover {
            background-color: #ff0000;
            color: #ffffff;
        }

        /* ==========================================================================
           【画面2】プレイ画面（ゲーム盤面）
           ========================================================================== */
        .play-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .game-status {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 400px;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .game-board {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 450px;
            border: 2px solid #000000;
            background-color: #ffffff;
            overflow: hidden;
        }

        .lanes {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .lane {
            flex: 1;
            border-right: 1px dashed #dddddd;
            position: relative;
            height: 100%;
        }

        .lane:last-child { border-right: none; }
        .lane.active { background-color: #f0f0f0; }

        .judgment-line {
            position: absolute;
            bottom: 60px;
            width: 100%;
            height: 3px;
            background-color: #000000;
            z-index: 5;
        }

        .key-label {
            position: absolute;
            bottom: 15px;
            width: 100%;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            color: #000000;
        }

        .note {
            position: absolute;
            width: 42px;
            height: 42px;
            background-color: #000000;
            border-radius: 50%;
            left: calc(50% - 21px);
            z-index: 3;
            transform: translateY(-21px);
        }

        .judgment-text {
            position: absolute;
            top: 35%;
            width: 100%;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            height: 40px;
            pointer-events: none;
            z-index: 10;
        }

        .play-controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }

        /* ==========================================================================
           【画面3】作製・編集画面（エディタ）
           ========================================================================== */
        .editor-form {
            border: 1px solid #000000;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .editor-form input {
            padding: 10px;
            font-size: 15px;
            border: 1px solid #000000;
            outline: none;
            width: 100%;
        }

        .editor-workspace {
            display: flex;
            gap: 20px;
        }

        @media (max-width: 650px) {
            .editor-workspace { flex-direction: column; }
        }

        .editor-left { flex: 1; }
        
        .editor-right {
            width: 240px;
            display: flex;
            flex-direction: column;
        }
        @media (max-width: 650px) { .editor-right { width: 100%; } }

        .log-box {
            border: 1px solid #000000;
            height: 220px;
            overflow-y: auto;
            background-color: #fafafa;
            padding: 10px;
            font-family: monospace;
            font-size: 14px;
        }

        .log-entry {
            border-bottom: 1px solid #eeeeee;
            padding: 4px 0;
        }

        .save-section {
            margin-top: 30px;
            border-top: 2px solid #000000;
            padding-top: 20px;
            text-align: center;
        }

        .save-btn {
            width: 100%;
            max-width: 400px;
            padding: 16px;
            font-size: 18px;
            background-color: #000000;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Rhythm Stream</h1>

    <div id="screen-top" class="screen active">
        <div class="top-header">
            <h2>🎵 登録された楽譜リスト</h2>
            <button onclick="switchScreen('edit')">✨ 新しい譜面を打ち込む</button>
        </div>
        <div id="chart-list-container" class="chart-list">
            </div>
    </div>

    <div id="screen-play" class="screen">
        <button class="back-btn" onclick="switchScreen('top')">← 一覧リストに戻る</button>
        
        <div class="play-layout">
            <h2 id="play-song-title" style="margin-bottom: 15px; text-align: center;">-</h2>
            
            <div class="video-container">
                <div id="youtube-player-play"></div>
            </div>

            <div class="game-status">
                <div id="score-display">SCORE: 0</div>
                <div id="combo-display">COMBO: 0</div>
            </div>

            <div class="game-board">
                <div id="judgment-text" class="judgment-text"></div>
                <div class="judgment-line"></div>
                <div class="lanes">
                    <div class="lane" id="lane-play-0"><span class="key-label">D</span></div>
                    <div class="lane" id="lane-play-1"><span class="key-label">F</span></div>
                    <div class="lane" id="lane-play-2"><span class="key-label">J</span></div>
                    <div class="lane" id="lane-play-3"><span class="key-label">K</span></div>
                </div>
            </div>

            <div class="play-controls">
                <button id="btn-play-start" onclick="startPlayGame()">▶ 曲を再生してスタート</button>
                <button onclick="clickResetButton()">🔄 リセット</button>
            </div>
        </div>
    </div>

    <div id="screen-edit" class="screen">
        <button class="back-btn" onclick="switchScreen('top')">← 作成をキャンセル</button>
        
        <div class="editor-form">
            <h3>1. 楽曲の設定</h3>
            <input type="text" id="edit-title" placeholder="曲のタイトルを入力してください（例: CHARM）">
            <input type="text" id="edit-url" placeholder="YouTubeの動画URL または 動画ID を入力">
            <button onclick="loadEditorVideo()" style="align-self: flex-start; padding: 8px 16px; font-size:14px;">動画を読み込む</button>
        </div>

        <div class="editor-workspace">
            <div class="editor-left">
                <h3>2. 打ち込み</h3>
                <p style="font-size: 13px; color: #666; margin-bottom: 10px;">
                    動画再生中にリズムに合わせてキーボードの【D, F, J, K】を押すと、自動的にそのタイミングが記録されます。
                </p>
                <div class="video-container">
                    <div id="youtube-player-edit"></div>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button onclick="playEditorVideo()">▶ 動画を再生</button>
                    <button onclick="pauseEditorVideo()">⏸ 一時停止</button>
                    <button onclick="clearEditorLogs()" style="background:#fff; color:#000;">🔄 やり直す</button>
                </div>
            </div>

            <div class="editor-right">
                <h3>📋 リアルタイムログ</h3>
                <div id="log-area" class="log-box"></div>
            </div>
        </div>

        <div class="save-section">
            <button class="save-btn" onclick="saveNewChart()">💾 譜面を完成させて一覧に保存する</button>
        </div>
    </div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
    // 定数・グローバル変数
    const DEFAULT_ID = 'P_NfP9_I6As'; 
    const KEYS = ['d', 'f', 'j', 'k'];
    
    let playerPlay = null;
    let playerEdit = null;
    let currentPlayVideoId = DEFAULT_ID;
    let currentEditVideoId = DEFAULT_ID;

    // ゲーム用コア変数
    let isPlaying = false;
    let score = 0;
    let combo = 0;
    let activeNotes = [];
    let loadedChartNotes = [];
    let nextNoteIndex = 0;
    let gameTimerId = null;
    let animationFrameId = null;
    const JUDGMENT_LINE_Y = 390; 
    const NOTE_SPEED = 6;        

    // 打ち込み用変数
    let recordedNotes = [];

    // 起動時にLocalStorageからデータを読み込んでリスト表示
    window.addEventListener('DOMContentLoaded', () => {
        setupDefaultChart();
        renderChartList();
    });

    function setupDefaultChart() {
        if (!localStorage.getItem('stream_charts')) {
            const sample = [{
                id: 'sample_default',
                title: 'CHARM (サンプル楽譜)',
                videoId: DEFAULT_ID,
                notes: [
                    { time: 1.5, key: 'D' }, { time: 2.0, key: 'F' }, 
                    { time: 2.5, key: 'J' }, { time: 3.0, key: 'K' },
                    { time: 4.0, key: 'F' }, { time: 4.5, key: 'J' }
                ]
            }];
            localStorage.setItem('stream_charts', JSON.stringify(sample));
        }
    }

    // ==========================================================================
    // 譜面データの管理（LocalStorage）
    // ==========================================================================
    function renderChartList() {
        const container = document.getElementById('chart-list-container');
        container.innerHTML = '';

        const charts = JSON.parse(localStorage.getItem('stream_charts')) || [];

        if (charts.length === 0) {
            container.innerHTML = '<p style="color:#666; text-align:center; padding:20px;">登録されている楽譜がありません。右上のボタンから作ってみましょう！</p>';
            return;
        }

        charts.forEach(chart => {
            const item = document.createElement('div');
            item.className = 'chart-item';
            item.innerHTML = `
                <div class="chart-info">
                    <h3>${chart.title}</h3>
                    <p>動画ID: ${chart.videoId} / 総ノーツ数: ${chart.notes.length}</p>
                </div>
                <div class="chart-btns">
                    <button onclick="loadAndPlayChart('${chart.id}')">▶ 遊ぶ</button>
                    <button class="delete-btn" onclick="deleteChart('${chart.id}')">削除</button>
                </div>
            `;
            container.appendChild(item);
        });
    }

    function deleteChart(id) {
        if (!confirm('この楽譜を削除してもよろしいですか？')) return;
        let charts = JSON.parse(localStorage.getItem('stream_charts')) || [];
        charts = charts.filter(c => c.id !== id);
        localStorage.setItem('stream_charts', JSON.stringify(charts));
        renderChartList();
    }

    function loadAndPlayChart(id) {
        const charts = JSON.parse(localStorage.getItem('stream_charts')) || [];
        const target = charts.find(c => c.id === id);
        if (!target) return;

        document.getElementById('play-song-title').innerText = `🎵 演奏中：${target.title}`;
        currentPlayVideoId = target.videoId;
        loadedChartNotes = target.notes.sort((a, b) => a.time - b.time);

        if (playerPlay && typeof playerPlay.cueVideoById === 'function') {
            playerPlay.cueVideoById(currentPlayVideoId);
        }
        switchScreen('play');
    }

    function saveNewChart() {
        const title = document.getElementById('edit-title').value.trim();
        if (!title) {
            alert('楽譜を保存するには、曲のタイトルを最初に入力してください。');
            return;
        }
        if (recordedNotes.length === 0) {
            alert('ノーツデータがありません。動画を再生しながらD, F, J, Kキーを押してリズムを打ち込んでください。');
            return;
        }

        const newChart = {
            id: 'chart_' + Date.now(),
            title: title,
            videoId: currentEditVideoId,
            notes: recordedNotes
        };

        const charts = JSON.parse(localStorage.getItem('stream_charts')) || [];
        charts.push(newChart);
        localStorage.setItem('stream_charts', JSON.stringify(charts));

        alert(`楽譜「${title}」の保存が完了しました！トップ一覧に追加されます。`);
        
        clearEditorLogs();
        document.getElementById('edit-title').value = '';
        document.getElementById('edit-url').value = '';
        
        switchScreen('top');
    }

    // ==========================================================================
    // YouTube API 関連
    // ==========================================================================
    function extractVideoId(urlOrId) {
        if (!urlOrId) return null;
        const str = urlOrId.trim();
        if (str.length === 11 && !str.includes('/') && !str.includes('=')) return str;
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = str.match(regExp);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    function loadEditorVideo() {
        const urlInput = document.getElementById('edit-url').value;
        const id = extractVideoId(urlInput);
        if (!id) {
            alert('有効なYouTubeのURLまたは動画IDを入力してください。');
            return;
        }
        currentEditVideoId = id;
        clearEditorLogs();
        if (playerEdit && typeof playerEdit.cueVideoById === 'function') {
            playerEdit.cueVideoById(currentEditVideoId);
        }
        alert('新しく動画を読み込みました！');
    }

    function onYouTubeIframeAPIReady() {
        playerPlay = new YT.Player('youtube-player-play', {
            videoId: currentPlayVideoId,
            playerVars: { 'playsinline': 1, 'controls': 1, 'disablekb': 1 },
            events: { 'onStateChange': onPlayerPlayStateChange }
        });

        playerEdit = new YT.Player('youtube-player-edit', {
            videoId: currentEditVideoId,
            playerVars: { 'playsinline': 1, 'controls': 1, 'disablekb': 1 }
        });
    }

    function switchScreen(name) {
        document.getElementById('screen-top').classList.remove('active');
        document.getElementById('screen-play').classList.remove('active');
        document.getElementById('screen-edit').classList.remove('active');

        if (playerPlay && typeof playerPlay.pauseVideo === 'function') playerPlay.pauseVideo();
        if (playerEdit && typeof playerEdit.pauseVideo === 'function') playerEdit.pauseVideo();
        resetPlayGame();

        if (name === 'top') {
            document.getElementById('screen-top').classList.add('active');
            renderChartList();
        } else if (name === 'play') {
            document.getElementById('screen-play').classList.add('active');
        } else if (name === 'edit') {
            document.getElementById('screen-edit').classList.add('active');
        }
    }

    function playEditorVideo() { if (playerEdit) playerEdit.playVideo(); }
    function pauseEditorVideo() { if (playerEdit) playerEdit.pauseVideo(); }
    function clearEditorLogs() {
        recordedNotes = [];
        document.getElementById('log-area').innerHTML = '';
    }

    // ==========================================================================
    // キーボード入力の検知
    // ==========================================================================
    window.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();
        const keyIndex = KEYS.indexOf(key);
        if (keyIndex === -1) return;

        if (document.getElementById('screen-play').classList.contains('active')) {
            const lane = document.getElementById(`lane-play-${keyIndex}`);
            if (lane) lane.classList.add('active');
            if (isPlaying) checkHitJudgment(keyIndex);
        }

        if (document.getElementById('screen-edit').classList.contains('active') && playerEdit) {
            if (playerEdit.getPlayerState() === YT.PlayerState.PLAYING) {
                const time = playerEdit.getCurrentTime();
                recordedNotes.push({
                    time: parseFloat(time.toFixed(2)),
                    key: key.toUpperCase()
                });

                const logArea = document.getElementById('log-area');
                const log = document.createElement('div');
                log.className = 'log-entry';
                log.innerText = `${time.toFixed(2)}秒: [${key.toUpperCase()}]`;
                logArea.appendChild(log);
                logArea.scrollTop = logArea.scrollHeight;
            }
        }
    });

    window.addEventListener('keyup', (e) => {
        const key = e.key.toLowerCase();
        const keyIndex = KEYS.indexOf(key);
        if (keyIndex !== -1) {
            const lane = document.getElementById(`lane-play-${keyIndex}`);
            if (lane) lane.classList.remove('active');
        }
    });

    // ==========================================================================
    // ゲームプレイ用の進行ロジック
    // ==========================================================================
    function startPlayGame() {
        if (!playerPlay) return;
        // リセット状態からそのまま再生
        playerPlay.playVideo();
    }

    function onPlayerPlayStateChange(event) {
        if (event.data === YT.PlayerState.PLAYING) {
            if (!isPlaying) {
                isPlaying = true;
                animationFrameId = requestAnimationFrame(gameRenderLoop);
                gameTimerId = setInterval(checkSpawnNotes, 20);
            }
        } else {
            stopGameLoops();
        }
    }

    function checkSpawnNotes() {
        if (!isPlaying || !playerPlay) return;
        const currentTime = playerPlay.getCurrentTime();
        const fallLag = (JUDGMENT_LINE_Y / NOTE_SPEED) / 60;

        while (nextNoteIndex < loadedChartNotes.length) {
            const noteData = loadedChartNotes[nextNoteIndex];
            if (currentTime >= (noteData.time - fallLag)) {
                const laneIdx = KEYS.indexOf(noteData.key.toLowerCase());
                if (laneIdx !== -1) {
                    spawnNoteElement(laneIdx);
                }
                nextNoteIndex++;
            } else {
                break;
            }
        }

        // 【新機能】すべてのノーツを生成し終え、かつ画面上にもうノーツが残っていない場合
        if (nextNoteIndex >= loadedChartNotes.length && activeNotes.length === 0) {
            setTimeout(() => {
                if (playerPlay && typeof playerPlay.pauseVideo === 'function') {
                    playerPlay.pauseVideo(); // 動画を自動停止
                    updateJudgmentUI("CLEAR!!", "#00cc00");
                }
            }, 500);
        }
    }

    function spawnNoteElement(laneIndex) {
        const lane = document.getElementById(`lane-play-${laneIndex}`);
        if (!lane) return;
        const element = document.createElement('div');
        element.className = 'note';
        element.style.top = '0px';
        lane.appendChild(element);

        activeNotes.push({
            lane: laneIndex,
            y: 0,
            element: element
        });
    }

    function gameRenderLoop() {
        if (!isPlaying) return;

        for (let i = activeNotes.length - 1; i >= 0; i--) {
            const note = activeNotes[i];
            note.y += NOTE_SPEED;
            note.element.style.top = note.y + 'px';

            if (note.y > JUDGMENT_LINE_Y + 40) {
                updateJudgmentUI("Miss", "#888888");
                combo = 0;
                document.getElementById('combo-display').innerText = `COMBO: ${combo}`;
                
                if (note.element.parentNode) note.element.parentNode.removeChild(note.element);
                activeNotes.splice(i, 1);
            }
        }
        animationFrameId = requestAnimationFrame(gameRenderLoop);
    }

    function checkHitJudgment(laneIndex) {
        let targetIdx = -1;
        let lowestY = -1;

        for (let i = 0; i < activeNotes.length; i++) {
            if (activeNotes[i].lane === laneIndex && activeNotes[i].y > lowestY) {
                lowestY = activeNotes[i].y;
                targetIdx = i;
            }
        }

        if (targetIdx === -1) return;

        const targetNote = activeNotes[targetIdx];
        const diff = Math.abs(targetNote.y - JUDGMENT_LINE_Y);
        let scored = false;

        if (diff <= 16) {
            updateJudgmentUI("Perfect!", "#000000");
            score += 100; combo++; scored = true;
        } else if (diff <= 36) {
            updateJudgmentUI("Great!", "#333333");
            score += 50; combo++; scored = true;
        } else if (diff <= 56) {
            updateJudgmentUI("Good", "#666666");
            score += 20; combo++; scored = true;
        }

        if (scored) {
            document.getElementById('score-display').innerText = `SCORE: ${score}`;
            document.getElementById('combo-display').innerText = `COMBO: ${combo}`;
            if (targetNote.element.parentNode) targetNote.element.parentNode.removeChild(targetNote.element);
            activeNotes.splice(targetIdx, 1);
        }
    }

    function updateJudgmentUI(text, color) {
        const el = document.getElementById('judgment-text');
        el.innerText = text;
        el.style.color = color;
    }

    function stopGameLoops() {
        isPlaying = false;
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        if (gameTimerId) clearInterval(gameTimerId);
    }

    // 【改良】ユーザーが「リセットボタン」を押したときの処理
    function clickResetButton() {
        resetPlayGame(); // ゲーム情報を初期化
        
        // YouTube動画を0秒（最初）に戻して、一時停止状態にする
        if (playerPlay && typeof playerPlay.seekTo === 'function') {
            playerPlay.seekTo(0, true);
            playerPlay.pauseVideo();
        }
    }

    function resetPlayGame() {
        stopGameLoops();
        score = 0;
        combo = 0;
        nextNoteIndex = 0;
        document.getElementById('score-display').innerText = "SCORE: 0";
        document.getElementById('combo-display').innerText = "COMBO: 0";
        document.getElementById('judgment-text').innerText = "";
        
        activeNotes.forEach(note => {
            if (note.element && note.element.parentNode) {
                note.element.parentNode.removeChild(note.element);
            }
        });
        activeNotes = [];
    }
</script>

</body>
</html>
