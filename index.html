<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>音色強制発火＆初心者版 DFJKリズムゲーム</title>
    <style>
        body { background-color: #1a1a1a; color: #ffffff; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .input-area { margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; align-items: center; background-color: #2a2a2a; padding: 15px; border-radius: 8px; width: 360px; }
        .file-label { padding: 10px 20px; background-color: #ff4757; color: white; font-weight: bold; border-radius: 4px; cursor: pointer; text-align: center; width: 80%; }
        #start-btn { padding: 12px 25px; background-color: #2ed573; color: white; font-size: 18px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; display: none; width: 85%; box-shadow: 0 0 10px #2ed573; }
        #status { margin-bottom: 15px; color: #feca57; font-weight: bold; text-align: center; }
        #game-container { width: 360px; height: 500px; background-color: #111; border: 4px solid #333; border-radius: 8px; position: relative; overflow: hidden; }
        #lanes { display: flex; width: 100%; height: 100%; }
        .lane { flex: 1; height: 100%; border-right: 1px solid #222; position: relative; }
        .lane:last-child { border-right: none; }
        #judge-line { position: absolute; bottom: 60px; width: 100%; height: 6px; background-color: #ff4757; box-shadow: 0 0 10px #ff4757; z-index: 10; }
        .key-label { position: absolute; bottom: 15px; width: 100%; text-align: center; font-weight: bold; color: #666; }
        .note { position: absolute; width: 90%; left: 5%; height: 15px; background: linear-gradient(to bottom, #00d2d3, #00a8ff); border-radius: 4px; z-index: 5; }
        #ui-overlay { position: absolute; top: 20%; width: 100%; text-align: center; pointer-events: none; z-index: 20; }
        #judge-text { font-size: 28px; font-weight: bold; height: 35px; }
        #combo-text { font-size: 20px; color: #feca57; }
        audio { width: 360px; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>強制音出し＆初心者向け DFJKリズムゲーム</h1>
    
    <div class="input-area">
        <label class="file-label">
            ① 音楽ファイルを選択
            <input type="file" id="audio-file" accept="audio/*" onchange="loadFile(event)">
        </label>
        <button id="start-btn" onclick="startGame()">② ゲームスタート！</button>
        <audio id="main-audio" controls style="display:none;"></audio>
    </div>
    <div id="status">まずは音楽ファイルを選んでね！</div>

    <div id="game-container">
        <div id="ui-overlay">
            <div id="judge-text"></div>
            <div id="combo-text"></div>
        </div>
        <div id="lanes">
            <div class="lane" id="lane-D"><div class="key-label">D</div></div>
            <div class="lane" id="lane-F"><div class="key-label">F</div></div>
            <div class="lane" id="lane-J"><div class="key-label">J</div></div>
            <div class="lane" id="lane-K"><div class="key-label">K</div></div>
        </div>
        <div id="judge-line"></div>
    </div>

<script>
var audioPlayer = document.getElementById('main-audio');
var synthCtx = null;
var chart = [];
var combo = 0;
var isPlaying = false;
var lanes = ['D', 'F', 'J', 'K'];
var gameStartTime = 0;

function loadFile(event) {
    var file = event.target.files[0];
    if (!file) return;

    var fileURL = URL.createObjectURL(file);
    audioPlayer.src = fileURL;
    
    resetGame();
    generateSuperEasyChart();
    
    document.getElementById('status').innerText = "読み込み完了！②のスタートボタンを押してね！";
    document.getElementById('start-btn').style.display = "block";
}

// 【難易度調整】かなり優しくまったりした譜面に変更
function generateSuperEasyChart() {
    chart = [];
    var totalSeconds = 300; 
    var lastTime = 2.0;

    while (lastTime < totalSeconds) {
        // ノーツの間隔を「0.4秒〜0.8秒」にして、リズムを格段に遅く優しくしました
        var interval = 0.4 + (Math.random() * 0.4);
        lastTime += interval;

        var lane = lanes[Math.floor(Math.random() * lanes.length)];
        chart.push({
            time: lastTime,
            lane: lane,
            hit: false,
            spawned: false
        });
    }
}

// 【絶対音出しシステム】万が一音楽が鳴らなくても、代わりに裏で電子メロディを強制演奏する
function playBackupTone() {
    if (!synthCtx) {
        synthCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (synthCtx.state === 'suspended') {
        synthCtx.resume();
    }
    
    // ピコッという短い音を鳴らす命令
    var osc = synthCtx.createOscillator();
    var gain = synthCtx.createGain();
    osc.type = 'triangle'; 
    osc.frequency.setValueAtTime(330, synthCtx.currentTime); // ミの音
    gain.gain.setValueAtTime(0.2, synthCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, synthCtx.currentTime + 0.1);
    osc.connect(gain);
    gain.connect(synthCtx.destination);
    osc.start();
    osc.stop(synthCtx.currentTime + 0.15);
}

function startGame() {
    // もし音楽プレイヤーが壊れていてもゲームが動くように、時間を強制取得
    if (!synthCtx) {
        synthCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    synthCtx.resume();

    audioPlayer.play().catch(function(e) {
        console.log("オーディオ再生はスキップ（電子音モードで走ります）");
    });

    gameStartTime = performance.now();
    isPlaying = true;
    document.getElementById('start-btn').style.display = "none";
    document.getElementById('status').innerText = "演奏中！ノーツに合わせてタイミングよく叩こう！";
    updateGame();
}

function resetGame() {
    chart = [];
    combo = 0;
    isPlaying = false;
    document.getElementById('judge-text').innerText = "";
    document.getElementById('combo-text').innerText = "";
    document.querySelectorAll('.note').forEach(n => n.remove());
}

var judgeLineTop = 440; 
var scrollSpeed = 180; // ノーツの落ちてくるスピードもかなり遅くして優しく

function updateGame() {
    if (!isPlaying) return;
    
    // 音楽ファイルの時間、または内部タイマーの正確な方を使用
    var currentTime = audioPlayer.currentTime > 0 ? audioPlayer.currentTime : (performance.now() - gameStartTime) / 1000;

    chart.forEach(function(note) {
        if (currentTime >= note.time - 2.0 && !note.spawned && !note.hit) {
            spawnNoteElement(note);
            note.spawned = true;
        }
    });
    requestAnimationFrame(updateGame);
}

function spawnNoteElement(note) {
    var laneElement = document.getElementById('lane-' + note.lane);
    var noteElement = document.createElement('div');
    noteElement.className = 'note';
    laneElement.appendChild(noteElement);

    // ノーツがラインに重なる瞬間に、強制的に「ピコッ」と音を鳴らす
    setTimeout(function() {
        if (isPlaying && !note.hit) {
            playBackupTone(); 
        }
    }, 2000 - 60); // 落ちてくる2秒後にジャストで発火

    function animateNote() {
        if (!isPlaying) {
            if (!note.hit && noteElement.parentNode) requestAnimationFrame(animateNote);
            return;
        }

        var currentTime = audioPlayer.currentTime > 0 ? audioPlayer.currentTime : (performance.now() - gameStartTime) / 1000;
        var timeDiff = note.time - currentTime; 
        var currentTop = judgeLineTop - (timeDiff * scrollSpeed);

        if (note.hit) {
            noteElement.remove();
            return;
        }

        if (timeDiff < -0.2) {
            noteElement.remove();
            if (!note.hit) {
                showVerdict("MISS", "#ff4757");
                combo = 0;
                document.getElementById('combo-text').innerText = "";
                note.hit = true;
            }
            return;
        }

        noteElement.style.top = currentTop + 'px';
        requestAnimationFrame(animateNote);
    }
    requestAnimationFrame(animateNote);
}

window.addEventListener('keydown', function(e) {
    var key = e.key.toUpperCase();
    if (lanes.includes(key)) {
        if (!isPlaying) return;
        var currentTime = audioPlayer.currentTime > 0 ? audioPlayer.currentTime : (performance.now() - gameStartTime) / 1000;
        
        var targetNote = chart.find(function(note) {
            return note.lane === key && !note.hit && Math.abs(note.time - currentTime) < 0.18;
        });

        if (targetNote) {
            targetNote.hit = true;
            showVerdict("PERFECT", "#00d2d3");
            combo++;
            document.getElementById('combo-text').innerText = combo + " COMBO";
            
            // 叩いた時にも気持ちいい打鍵音を鳴らす
            playBackupTone();
        }
    }
});

function showVerdict(text, color) {
    var el = document.getElementById('judge-text');
    el.innerText = text;
    el.style.color = color;
}
</script>
</body>
</html>
