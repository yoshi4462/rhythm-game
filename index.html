<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhythm Stream - Perfect Sync</title>
    <style>
        /* ==========================================================================
           全体デザイン：背景は白、文字と枠線は黒の超シンプルスタイル
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h1 {
            font-size: 26px;
            text-align: center;
            letter-spacing: 2px;
            font-weight: bold;
            border-bottom: 2px solid #000000;
            padding-bottom: 10px;
        }

        button {
            background-color: #000000;
            color: #ffffff;
            border: 1px solid #000000;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s ease;
            width: 100%;
        }

        button:hover {
            background-color: #ffffff;
            color: #000000;
        }

        /* URL入力エリア */
        .input-box {
            border: 2px solid #000000;
            padding: 20px;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-box input {
            padding: 12px;
            font-size: 15px;
            border: 1px solid #000000;
            background-color: #ffffff;
            color: #000000;
            outline: none;
            width: 100%;
        }

        /* YouTubeプレイヤーエリア */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background-color: #000000;
            border: 1px solid #000000;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* スコア・コンボ */
        .game-status {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            padding: 0 5px;
        }

        /* タイミング調整パネル */
        .offset-panel {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px dashed #000000;
            padding: 10px;
            font-size: 14px;
            background-color: #fafafa;
        }
        .offset-btns {
            display: flex;
            gap: 5px;
        }
        .offset-btns button {
            padding: 4px 10px;
            font-size: 14px;
            width: auto;
        }

        /* ゲーム盤面 */
        .game-container {
            position: relative;
            width: 100%;
            height: 380px;
            border: 2px solid #000000;
            background-color: #ffffff;
            overflow: hidden;
        }

        .lanes {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .lane {
            flex: 1;
            border-right: 1px solid #e0e0e0;
            position: relative;
            height: 100%;
        }

        .lane:last-child { border-right: none; }
        .lane.active { background-color: #f0f0f0; }

        .line {
            position: absolute;
            bottom: 60px;
            width: 100%;
            height: 3px;
            background-color: #000000;
            z-index: 5;
        }

        .key-text {
            position: absolute;
            bottom: 15px;
            width: 100%;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
        }

        .note {
            position: absolute;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            left: calc(50% - 18px);
            z-index: 3;
            transform: translateY(-18px);
            background-color: #000000;
        }

        .ui-text {
            position: absolute;
            top: 35%;
            width: 100%;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            height: 40px;
            pointer-events: none;
            z-index: 10;
        }

        .control-panel {
            display: flex;
            gap: 10px;
        }
        .control-panel button {
            flex: 1;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Rhythm Stream</h1>

    <div class="input-box">
        <input type="text" id="input-url" placeholder="YouTubeの動画URL または 動画ID をコピペ">
        <button onclick="loadAndGenerateChart()">⚡ 動画を読み込んで楽譜を自動生成</button>
    </div>

    <div class="video-wrapper">
        <div id="yt-player"></div>
    </div>

    <div class="game-status">
        <div id="txt-score">SCORE: 0</div>
        <div id="txt-combo">COMBO: 0</div>
    </div>

    <div class="offset-panel">
        <div>⏱ ズレ微調整: <span id="offset-val" style="font-weight:bold;">0</span> 秒遅らせる</div>
        <div class="offset-btns">
            <button onclick="adjustOffset(-0.05)">-0.05秒</button>
            <button onclick="adjustOffset(0.05)">+0.05秒</button>
        </div>
    </div>

    <div class="game-container">
        <div id="txt-judge" class="ui-text"></div>
        <div class="line"></div>
        <div class="lanes">
            <div class="lane" id="lane-0"><span class="key-text">D</span></div>
            <div class="lane" id="lane-1"><span class="key-text">F</span></div>
            <div class="lane" id="lane-2"><span class="key-text">J</span></div>
            <div class="lane" id="lane-3"><span class="key-text">K</span></div>
        </div>
    </div>

    <div class="control-panel">
        <button
