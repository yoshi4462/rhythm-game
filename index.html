<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhythm Stream - Auto Generator</title>
    <style>
        /* ==========================================================================
           全体デザイン（ミニマル・モノトーン＋ネオン）
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background-color: #111111;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
        }

        h1 {
            font-size: 26px;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        button {
            background-color: #ffffff;
            color: #000000;
            border: 1px solid #ffffff;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: #000000;
            color: #ffffff;
        }

        .screen {
            display: none;
            width: 100%;
            flex-direction: column;
        }

        .screen.active {
            display: flex;
        }

        .back-btn {
            background-color: #111111;
            color: #ffffff;
            border-color: #ffffff;
            align-self: flex-start;
            margin-bottom: 20px;
            padding: 8px 16px;
            font-size: 14px;
        }

        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background-color: #000000;
            margin-bottom: 20px;
            border: 1px solid #333;
        }

        .video-container iframe, .video-container div {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ==========================================================================
           【画面1】トップ画面 & 検索・譜面一覧
           ========================================================================== */
        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #ffffff;
            padding-bottom: 15px;
            gap: 10px;
        }

        .top-header h2 { font-size: 20px; }

        .search-container {
            margin-bottom: 20px;
            width: 100%;
        }

        .search-input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            background-color: #222222;
            border: 1px solid #ffffff;
            color: #ffffff;
            outline: none;
        }

        .chart-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .chart-item {
            border: 1px solid #ffffff;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #222222;
        }

        .chart-info h3 {
            font-size: 18px;
            margin-bottom: 5px;
        }

        .chart-info p {
            font-size: 13px;
            color: #aaaaaa;
        }

        .chart-btns {
            display: flex;
            gap: 10px;
        }

        .delete-btn {
            background-color: #222222;
            color: #ff4444;
            border-color: #ff4444;
        }
        .delete-btn:hover {
            background-color: #ff4444;
            color: #ffffff;
        }

        /* ==========================================================================
           【画面2】プレイ画面 & ネオンノーツ
           ========================================================================== */
        .play-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .game-status {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 400px;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .game-board {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 450px;
            border: 2px solid #ffffff;
            background-color: #050505;
            overflow: hidden;
        }

        .lanes {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .lane {
            flex: 1;
            border-right: 1px solid #222222;
            position: relative;
            height: 100%;
        }

        .lane:last-child { border-right: none; }
        .lane.active { background: linear-gradient(to top, rgba(255,255,255,0.1), transparent); }

        .judgment-line {
            position: absolute;
            bottom: 60px;
            width: 100%;
            height: 3px;
            background-color: #ffffff;
            box-shadow: 0 0 10px #ffffff;
            z-index: 5;
        }

        .key-label {
            position: absolute;
            bottom: 15px;
            width: 100%;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            color: #ffffff;
        }

        .note {
            position: absolute;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            left: calc(50% - 21px);
            z-index: 3;
            transform: translateY(-21px);
        }
        .note-0 { background: #ff0055; box-shadow: 0 0 15px #ff0055; }
        .note-1 { background: #00e5ff; box-shadow: 0 0 15px #00e5ff; }
        .note-2 { background: #00ff66; box-shadow: 0 0 15px #00ff66; }
        .note-3 { background: #ffea00; box-shadow: 0 0 15px #ffea00; }

        .judgment-text {
            position: absolute;
            top: 35%;
            width: 100%;
            text-align: center;
            font-size: 36px;
            font-weight: bold;
            height: 45px;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 10px rgba(255,255,255,0.8);
        }

        .play-controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }

        /* ==========================================================================
           【画面3】エディタ画面
           ========================================================================== */
        .editor-form {
            border: 1px solid #ffffff;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-color: #222222;
        }

        .editor-form input {
            padding: 10px;
            font-size: 15px;
            background-color: #111111;
            border: 1px solid #ffffff;
            color: #ffffff;
            outline: none;
            width: 100%;
        }

        .editor-workspace {
            display: flex;
            gap: 20px;
        }

        @media (max-width: 650px) {
            .editor-workspace { flex-direction: column; }
        }

        .editor-left { flex: 1; }
        
        .editor-right {
            width: 240px;
            display: flex;
            flex-direction: column;
        }
        @media (max-width: 650px) { .editor-right { width: 100%; } }

        .log-box {
            border: 1px solid #ffffff;
            height: 220px;
            overflow-y: auto;
            background-color: #111111;
            padding: 10px;
            font-family: monospace;
            font-size: 14px;
        }

        .log-entry {
            border-bottom: 1px solid #222222;
            padding: 4px 0;
        }

        .save-section {
            margin-top: 30px;
            border-top: 2px solid #ffffff;
            padding-top: 20px;
            text-align: center;
        }

        .save-btn {
            width: 100%;
            max-width: 400px;
            padding: 16px;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Rhythm Stream</h1>

    <div id="screen-top" class="screen active">
        <div class="top-header">
            <h2>🎵 登録された楽譜リスト</h2>
            <button onclick="switchScreen('edit')">✨ 新しい曲・自動生成を追加</button>
        </div>
        
        <div class="search-container">
            <input type="text" id="search-bar" class="search-input" placeholder="🔍 曲名で楽譜を検索..." oninput="renderChartList()">
        </div>

        <div id="chart-list-container" class="chart-list">
        </div>
    </div>

    <div id="screen-play" class="screen">
        <button class="back-btn" onclick="switchScreen('top')">← 一覧リストに戻る</button>
        
        <div class="play-layout">
            <h2 id="play-song-title" style="margin-bottom: 15px; text-align: center;">-</h2>
            
            <div class="video-container">
                <div id="youtube-player-play"></div>
            </div>

            <div class="game-status">
                <div id="score-display">SCORE: 0</div>
                <div id="combo-display">COMBO: 0</div>
            </div>

            <div class="game-board">
                <div id="judgment-text" class="judgment-text"></div>
                <div class="judgment-line"></div>
                <div class="lanes">
                    <div class="lane" id="lane-play-0"><span class="key-label">D</span></div>
                    <div class="lane" id="lane-play-1"><span class="key-label">F</span></div>
                    <div class="lane" id="lane-play-2"><span class="key-label">J</span></div>
                    <div class="lane" id="lane-play-3"><span class="key-label">K</span></div>
                </div>
            </div>

            <div class="play-controls">
                <button id="btn-play-start" onclick="startCountdown()">▶ 3秒後にスタート</button>
                <button onclick="clickResetButton()">🔄 リセット</button>
            </div>
        </div>
    </div>

    <div id="screen-edit" class="screen">
        <button class="back-btn" onclick="switchScreen('top')">← キャンセル</button>
        
        <div class="editor-form">
            <h3>1. 楽曲の設定（URLを入れると勝手に音符が作られます！）</h3>
            <input type="text" id="edit-title" placeholder="曲のタイトルを入力してください">
            <input type="text" id="edit-url" placeholder="YouTubeの動画URL または 動画ID を入力">
            <button onclick="loadEditorVideo()" style="align-self: flex-start; padding: 8px 16px; font-size:14px; background-color:#00ff66; color:#000; border-color:#00ff66;">🎵 動画の読み込み＆音符を自動生成</button>
        </div>

        <div class="editor-workspace">
            <div class="editor-left">
                <h3>2. 生成されたプレビュー・手動修正</h3>
                <p style="font-size: 13px; color: #aaa; margin-bottom: 10px;">
                    自動生成された後に動画を再生しながら【D, F, J, K】を押して、さらに音符を追加することも可能です！
                </p>
                <div class="video-container">
                    <div id="youtube-player-edit"></div>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button onclick="playEditorVideo()">▶ 動画を確認再生</button>
                    <button onclick="pauseEditorVideo()">⏸ 一時停止</button>
                    <button onclick="clearEditorLogs()" style="background:#222; color:#fff; border-color:#fff;">🔄 最初からやり直す</button>
                </div>
            </div>

            <div class="editor-right">
                <h3>📋 現在の音符データ</h3>
                <div id="log-area" class="log-box"></div>
            </div>
        </div>

        <div class="save-section">
            <button class="save-btn" onclick="saveNewChart()" style="background-color:#00e5ff; color:#000; border-color:#00e5ff;">💾 この譜面をリストに保存する</button>
        </div>
    </div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
    const DEFAULT_ID = 'P_NfP9_I6As'; 
    const KEYS = ['d', 'f', 'j', 'k'];
    
    let playerPlay = null;
    let playerEdit = null;
    let currentPlayVideoId = DEFAULT_ID;
    let currentEditVideoId = DEFAULT_ID;

    let isPlaying = false;
    let isCountingDown = false; 
    let score = 0;
    let combo = 0;
    let activeNotes = [];
    let loadedChartNotes = [];
    let nextNoteIndex = 0;
    let gameTimerId = null;
    let animationFrameId = null;
    let countdownIntervalId = null;
    const JUDGMENT_LINE_Y = 390; 
    const NOTE_SPEED = 6;        

    let recordedNotes = [];

    // Web Audio API 打鍵音処理
    let audioCtx = null;
    function playHitSound() {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'sine'; 
            osc.frequency.setValueAtTime(330, audioCtx.currentTime); 
            
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.08);
        } catch(e) {}
    }

    window.addEventListener('DOMContentLoaded', () => {
        setupDefaultChart();
        renderChartList();
    });

    function setupDefaultChart() {
        if (!localStorage.getItem('stream_charts')) {
            localStorage.setItem('stream_charts', JSON.stringify([]));
        }
    }

    function renderChartList() {
        const container = document.getElementById('chart-list-container');
        const searchWord = document.getElementById('search-bar').value.toLowerCase().trim();
        container.innerHTML = '';
        
        const charts = JSON.parse(localStorage.getItem('stream_charts')) || [];
        const filteredCharts = charts.filter(chart => chart.title.toLowerCase().includes(searchWord));

        if (filteredCharts.length === 0) {
            container.innerHTML = '<p style="color:#aaa; text-align:center; padding:20px;">該当する楽譜が見つかりません。</p>';
            return;
        }

        filteredCharts.forEach(chart => {
            const item = document.createElement('div');
            item.className = 'chart-item';
            item.innerHTML = `
                <div class="chart-info">
                    <h3>${chart.title}</h3>
                    <p>動画ID: ${chart.videoId} / 総ノーツ数: ${chart.notes.length}</p>
                </div>
                <div class="chart-btns">
                    <button onclick="loadAndPlayChart('${chart.id}')">▶ 遊ぶ</button>
                    <button class="delete-btn" onclick="deleteChart('${chart.id}')">削除</button>
                </div>
            `;
            container.appendChild(item);
        });
    }

    function deleteChart(id) {
        if (!confirm('この楽譜を削除してもよろしいですか？')) return;
        let charts = JSON.parse(localStorage.getItem('stream_charts')) || [];
        charts = charts.filter(c => c.id !== id);
        localStorage.setItem('stream_charts', JSON.stringify(charts));
        renderChartList();
    }

    function loadAndPlayChart(id) {
        const charts = JSON.parse(localStorage.getItem('stream_charts')) || [];
        const target = charts.find(c => c.id === id);
        if (!target) return;

        document.getElementById('play-song-title').innerText = `🎵 演奏中：${target.title}`;
        currentPlayVideoId = target.videoId;
        loadedChartNotes = target.notes.sort((a, b) => a.time - b.time);

        if (playerPlay && typeof playerPlay.cueVideoById === 'function') {
            playerPlay.cueVideoById(currentPlayVideoId);
        }
        switchScreen('play');
    }

    function saveNewChart() {
        const title = document.getElementById('edit-title').value.trim();
        if (!title) {
            alert('保存するには、曲のタイトルを最初に入力してください。');
            return;
        }
        if (recordedNotes.length === 0) {
            alert('ノーツデータがありません。');
            return;
        }
        const newChart = {
            id: 'chart_' + Date.now(),
            title: title,
            videoId: currentEditVideoId,
            notes: recordedNotes
        };
        const charts = JSON.parse(localStorage.getItem('stream_charts')) || [];
        charts.push(newChart);
        localStorage.setItem('stream_charts', JSON.stringify(charts));
        alert(`楽譜「${title}」の保存が完了しました！`);
        clearEditorLogs();
        document.getElementById('edit-title').value = '';
        document.getElementById('edit-url').value = '';
        switchScreen('top');
    }

    function extractVideoId(urlOrId) {
        if (!urlOrId) return null;
        const str = urlOrId.trim();
        if (str.length === 11 && !str.includes('/') && !str.includes('=')) return str;
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = str.match(regExp);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    // 【核心機能】動画読み込み時に自動で譜面（音符）を作成する
    function loadEditorVideo() {
        const titleInput = document.getElementById('edit-title').value.trim();
        const urlInput = document.getElementById('edit-url').value;
        const id = extractVideoId(urlInput);
        
        if (!titleInput) {
            alert('先に「曲のタイトル」を入力してください！');
            return;
        }
        if (!id) {
            alert('有効なYouTubeのURLまたは動画IDを入力してください。');
            return;
        }
        
        currentEditVideoId = id;
        clearEditorLogs();
        
        if (playerEdit && typeof playerEdit.cueVideoById === 'function') {
            playerEdit.cueVideoById(currentEditVideoId);
        }

        // YouTubeプレーヤーのメタデータ読み込みを少し待ってから、自動ノーツを生成
        setTimeout(() => {
            generateAutoNotes();
        }, 1200);
    }

    // 【自動生成アルゴリズム】動画の長さをもとに、ランダムかつリズム良くノーツを生成する
    function generateAutoNotes() {
        let duration = 300; // 万が一動画の長さが取れなかった場合の初期値（5分分）
        if (playerEdit && typeof playerEdit.getDuration === 'function') {
            const ytDuration = playerEdit.getDuration();
            if (ytDuration > 10) duration = ytDuration;
        }

        recordedNotes = [];
        const logArea = document.getElementById('log-area');
        logArea.innerHTML = '';

        // 一般的な曲のテンポ（例: 0.4秒〜0.6秒間隔）で機械的にノーツを配置
        // 最初の4秒はイントロの猶予として空ける
        let currentTime = 4.0;
        const keysList = ['D', 'F', 'J', 'K'];

        while (currentTime < duration - 3) {
            // ランダムにキーを選択
            const randomKey = keysList[Math.floor(Math.random() * keysList.length)];
            
            recordedNotes.push({
                time: parseFloat(currentTime.toFixed(2)),
                key: randomKey
            });

            const log = document.createElement('div');
            log.className = 'log-entry';
            log.innerText = `${currentTime.toFixed(2)}秒: [${randomKey}] (自動生成)`;
            logArea.appendChild(log);

            // 次のノーツまでの間隔（リズムが崩れすぎないよう0.4〜0.8秒の間でランダムに）
            const nextGap = 0.4 + (Math.floor(Math.random() * 3) * 0.2); 
            currentTime += nextGap;
        }
        
        logArea.scrollTop = 0;
        alert('✨ お待たせしました！YouTube動画から、ネオン音符を自動で1曲分生成しました！下の青い保存ボタンを押せば、すぐにプレイリストに登録されます！');
    }

    function onYouTubeIframeAPIReady() {
        playerPlay = new YT.Player('youtube-player-play', {
            videoId: currentPlayVideoId,
            playerVars: { 'playsinline': 1, 'controls': 1, 'disablekb': 1 },
            events: { 'onStateChange': onPlayerPlayStateChange }
        });

        playerEdit = new YT.Player('youtube-player-edit', {
            videoId: currentEditVideoId,
            playerVars: { 'playsinline': 1, 'controls': 1, 'disablekb': 1 }
        });
    }

    function switchScreen(name) {
        document.getElementById('screen-top').classList.remove('active');
        document.getElementById('screen-play').classList.remove('active');
        document.getElementById('screen-edit').classList.remove('active');

        if (countdownIntervalId) clearInterval(countdownIntervalId);
        isCountingDown = false;

        if (playerPlay && typeof playerPlay.pauseVideo === 'function') playerPlay.pauseVideo();
        if (playerEdit && typeof playerEdit.pauseVideo === 'function') playerEdit.pauseVideo();
        resetPlayGame();

        if (name === 'top') {
            document.getElementById('screen-top').classList.add('active');
            document.getElementById('search-bar').value = '';
            renderChartList();
        } else if (name === 'play') {
            document.getElementById('screen-play').classList.add('active');
        } else if (name === 'edit') {
            document.getElementById('screen-edit').classList.add('active');
        }
    }

    function playEditorVideo() { if (playerEdit) playerEdit.playVideo(); }
    function pauseEditorVideo() { if (playerEdit) playerEdit.pauseVideo(); }
    function clearEditorLogs() {
        recordedNotes = [];
        document.getElementById('log-area').innerHTML = '';
    }

    // キーボード入力検知
    window.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();
        const keyIndex = KEYS.indexOf(key);
        if (keyIndex === -1) return;

        if (document.getElementById('screen-play').classList.contains('active')) {
            const lane = document.getElementById(`lane-play-${keyIndex}`);
            if (lane) lane.classList.add('active');
            playHitSound();
            if (isPlaying && !isCountingDown) checkHitJudgment(keyIndex);
        }

        if (document.getElementById('screen-edit').classList.contains('active') && playerEdit) {
            if (playerEdit.getPlayerState() === YT.PlayerState.PLAYING) {
                playHitSound();
                const time = playerEdit.getCurrentTime();
                recordedNotes.push({
                    time: parseFloat(time.toFixed(2)),
                    key: key.toUpperCase()
                });
                const logArea = document.getElementById('log-area');
                const log = document.createElement('div');
                log.className = 'log-entry';
                log.innerText = `${time.toFixed(2)}秒: [${key.toUpperCase()}] (手動追加)`;
                logArea.appendChild(log);
                logArea.scrollTop = logArea.scrollHeight;
            }
        }
    });

    window.addEventListener('keyup', (e) => {
        const key = e.key.toLowerCase();
        const keyIndex = KEYS.indexOf(key);
        if (keyIndex !== -1) {
            const lane = document.getElementById(`lane-play-${keyIndex}`);
            if (lane) lane.classList.remove('active');
        }
    });

    // カウントダウン
    function startCountdown() {
        if (isPlaying || isCountingDown) return;
        
        isCountingDown = true;
        resetPlayGame(); 
        
        let count = 3;
        updateJudgmentUI(count, "#ff0055");

        countdownIntervalId = setInterval(() => {
            count--;
            if (count > 0) {
                updateJudgmentUI(count, "#ff0055");
            } else if (count === 0) {
                updateJudgmentUI("START!!", "#00ff66");
            } else {
                clearInterval(countdownIntervalId);
                isCountingDown = false;
                updateJudgmentUI("", "#fff");
                if (playerPlay) playerPlay.playVideo();
            }
        }, 1000);
    }

    function onPlayerPlayStateChange(event) {
        if (event.data === YT.PlayerState.PLAYING) {
            if (!isPlaying) {
                isPlaying = true;
                animationFrameId = requestAnimationFrame(gameRenderLoop);
                gameTimerId = setInterval(checkSpawnNotes, 20);
            }
        } else {
            stopGameLoops();
        }
    }

    function checkSpawnNotes() {
        if (!isPlaying || !playerPlay) return;
        const currentTime = playerPlay.getCurrentTime();
        const fallLag = (JUDGMENT_LINE_Y / NOTE_SPEED) / 60;

        while (nextNoteIndex < loadedChartNotes.length) {
            const noteData = loadedChartNotes[nextNoteIndex];
            if (currentTime >= (noteData.time - fallLag)) {
                const laneIdx = KEYS.indexOf(noteData.key.toLowerCase());
                if (laneIdx !== -1) {
                    spawnNoteElement(laneIdx);
                }
                nextNoteIndex++;
            } else {
                break;
            }
        }

        if (nextNoteIndex >= loadedChartNotes.length && activeNotes.length === 0) {
            stopGameLoops();
            if (playerPlay && typeof playerPlay.pauseVideo === 'function') playerPlay.pauseVideo(); 
            updateJudgmentUI("CLEAR!!", "#00ff66");
        }
    }

    function spawnNoteElement(laneIndex) {
        const lane = document.getElementById(`lane-play-${laneIndex}`);
        if (!lane) return;
        const element = document.createElement('div');
        element.className = `note note-${laneIndex}`; 
        element.style.top = '0px';
        lane.appendChild(element);

        activeNotes.push({
            lane: laneIndex,
            y: 0,
            element: element
        });
    }

    function gameRenderLoop() {
        if (!isPlaying) return;
        for (let i = activeNotes.length - 1; i >= 0; i--) {
            const note = activeNotes[i];
            note.y += NOTE_SPEED;
            note.element.style.top = note.y + 'px';

            if (note.y > JUDGMENT_LINE_Y + 40) {
                updateJudgmentUI("Miss", "#555555");
                combo = 0;
                document.getElementById('combo-display').innerText = `COMBO: ${combo}`;
                if (note.element.parentNode) note.element.parentNode.removeChild(note.element);
                activeNotes.splice(i, 1);
            }
        }
        animationFrameId = requestAnimationFrame(gameRenderLoop);
    }

    function checkHitJudgment(laneIndex) {
        let targetIdx = -1;
        let lowestY = -1;
        for (let i = 0; i < activeNotes.length; i++) {
            if (activeNotes[i].lane === laneIndex && activeNotes[i].y > lowestY) {
                lowestY = activeNotes[i].y;
                targetIdx = i;
            }
        }
        if (targetIdx === -1) return;

        const targetNote = activeNotes[targetIdx];
        const diff = Math.abs(targetNote.y - JUDGMENT_LINE_Y);
        let scored = false;

        if (diff <= 16) {
            updateJudgmentUI("Perfect!", "#ffffff");
            score += 100; combo++; scored = true;
        } else if (diff <= 36) {
            updateJudgmentUI("Great!", "#00e5ff");
            score += 50; combo++; scored = true;
        } else if (diff <= 56) {
            updateJudgmentUI("Good", "#aaaaaa");
            score += 20; combo++; scored = true;
        }

        if (scored) {
            document.getElementById('score-display').innerText = `SCORE: ${score}`;
            document.getElementById('combo-display').innerText = `COMBO: ${combo}`;
            if (targetNote.element.parentNode) targetNote.element.parentNode.removeChild(targetNote.element);
            activeNotes.splice(targetIdx, 1);
        }
    }

    function updateJudgmentUI(text, color) {
        const el = document.getElementById('judgment-text');
        el.innerText = text;
        el.style.color = color;
        el.style.textShadow = `0 0 10px ${color}`;
    }

    function stopGameLoops() {
        isPlaying = false;
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        if (gameTimerId) clearInterval(gameTimerId);
    }

    function clickResetButton() {
        if (countdownIntervalId) clearInterval(countdownIntervalId);
        isCountingDown = false;
        resetPlayGame(); 
        if (playerPlay && typeof playerPlay.seekTo === 'function') {
            playerPlay.seekTo(0, true);
            playerPlay.pauseVideo();
        }
    }

    function resetPlayGame() {
        stopGameLoops();
        score = 0;
        combo = 0;
        nextNoteIndex = 0;
        document.getElementById('score-display').innerText = "SCORE: 0";
        document.getElementById('combo-display').innerText = "COMBO: 0";
        document.getElementById('judgment-text').innerText = "";
        activeNotes.forEach(note => {
            if (note.element && note.element.parentNode) note.element.parentNode.removeChild(note.element);
        });
        activeNotes = [];
    }
</script>
</body>
</html>
